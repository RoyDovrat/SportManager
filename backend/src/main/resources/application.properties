spring.application.name=SportManager

spring.datasource.url=jdbc:postgresql://localhost:5432/sportmanager
spring.datasource.username=postgres
spring.datasource.password=SportManager30

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (change secret before production)
app.jwt.secret=SportManagerJwtSecretKeyThatIsLongEnoughForHS256Algorithm2026
app.jwt.expiration-ms=86400000

# Seeded on first startup if missing (change after first login in production)
app.admin.default-username=admin
app.admin.default-password=admin123
